<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 175" width="160" height="175">
  <defs>
    <radialGradient id="dogBody" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ffe0bf"/>
      <stop offset="100%" stop-color="#f0cba0"/>
    </radialGradient>
    <radialGradient id="dogMuzzle" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#fffaf2"/>
      <stop offset="100%" stop-color="#fff8ec"/>
    </radialGradient>
  </defs>

  <!-- shadow -->
  <ellipse cx="80" cy="160" rx="48" ry="8" fill="#000" opacity="0.15"/>

  <!-- floppy ears -->
  <ellipse cx="30" cy="68" rx="20" ry="34" fill="#e0b888" transform="rotate(20,30,68)"/>
  <ellipse cx="130" cy="68" rx="20" ry="34" fill="#e0b888" transform="rotate(-20,130,68)"/>
  <ellipse cx="32" cy="70" rx="11" ry="22" fill="#ffe0bf" transform="rotate(20,32,70)"/>
  <ellipse cx="128" cy="70" rx="11" ry="22" fill="#ffe0bf" transform="rotate(-20,128,70)"/>

  <!-- body -->
  <ellipse cx="80" cy="130" rx="50" ry="36" fill="url(#dogBody)"/>

  <!-- head -->
  <circle cx="80" cy="76" r="48" fill="url(#dogBody)"/>

  <!-- patch -->
  <ellipse cx="106" cy="50" rx="20" ry="22" fill="#e0b888" opacity="0.6"/>

  <!-- muzzle -->
  <ellipse cx="80" cy="92" rx="28" ry="22" fill="url(#dogMuzzle)"/>

  <!-- eyes -->
  <ellipse cx="58" cy="72" rx="14" ry="16" fill="#fff"/>
  <ellipse cx="102" cy="72" rx="14" ry="16" fill="#fff"/>
  <ellipse cx="61" cy="77" rx="8.5" ry="10" fill="#4a3018"/>
  <ellipse cx="105" cy="77" rx="8.5" ry="10" fill="#4a3018"/>
  <circle cx="64" cy="70" r="3" fill="#fff"/>
  <circle cx="108" cy="70" r="3" fill="#fff"/>

  <!-- cheeks -->
  <ellipse cx="44" cy="90" rx="13" ry="9" fill="#ffc9a3" opacity="0.7"/>
  <ellipse cx="116" cy="90" rx="13" ry="9" fill="#ffc9a3" opacity="0.7"/>

  <!-- nose -->
  <ellipse cx="80" cy="96" rx="8" ry="6" fill="#4a3018"/>
  <ellipse cx="77" cy="94" rx="2.5" ry="1.5" fill="#fff" opacity="0.6"/>

  <!-- tongue + mouth -->
  <path d="M64 102 Q80 116 96 102" stroke="#4a3018" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="80" cy="108" rx="9" ry="12" fill="#ff8fa3"/>

  <!-- paws -->
  <ellipse cx="58" cy="160" rx="18" ry="12" fill="#ffe9d3"/>
  <ellipse cx="102" cy="160" rx="18" ry="12" fill="#ffe9d3"/>

  <!-- belly highlight -->
  <ellipse cx="80" cy="136" rx="26" ry="20" fill="#fff" opacity="0.25"/>
</svg>