<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 170" width="160" height="170">
  <defs>
    <radialGradient id="catBody" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#ffd9a8"/>
      <stop offset="100%" stop-color="#ffb86b"/>
    </radialGradient>
    <radialGradient id="catCheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffaec9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffaec9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- shadow -->
  <ellipse cx="80" cy="158" rx="46" ry="8" fill="#000" opacity="0.15"/>

  <!-- tail -->
  <path d="M118 130 Q150 130 148 95 Q146 75 128 78 Q138 100 116 112 Z" fill="#ffb86b"/>

  <!-- body -->
  <ellipse cx="80" cy="128" rx="48" ry="36" fill="url(#catBody)"/>

  <!-- head -->
  <circle cx="80" cy="70" r="48" fill="url(#catBody)"/>

  <!-- ears -->
  <polygon points="38,42 22,4 64,30" fill="#ffb86b"/>
  <polygon points="122,42 138,4 96,30" fill="#ffb86b"/>
  <polygon points="40,40 30,16 58,30" fill="#ffd9c2"/>
  <polygon points="120,40 130,16 102,30" fill="#ffd9c2"/>

  <!-- cheeks -->
  <circle cx="44" cy="84" r="14" fill="url(#catCheek)"/>
  <circle cx="116" cy="84" r="14" fill="url(#catCheek)"/>

  <!-- eyes (big sparkly) -->
  <ellipse cx="58" cy="70" rx="17" ry="19" fill="#fff"/>
  <ellipse cx="102" cy="70" rx="17" ry="19" fill="#fff"/>
  <ellipse cx="61" cy="75" rx="10" ry="12" fill="#4a3826"/>
  <ellipse cx="105" cy="75" rx="10" ry="12" fill="#4a3826"/>
  <circle cx="65" cy="68" r="3.5" fill="#fff"/>
  <circle cx="109" cy="68" r="3.5" fill="#fff"/>
  <circle cx="57" cy="79" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="101" cy="79" r="2" fill="#fff" opacity="0.8"/>

  <!-- eyebrow flecks -->
  <path d="M48 56 Q58 50 68 56" stroke="#e0995c" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M92 56 Q102 50 112 56" stroke="#e0995c" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- nose -->
  <ellipse cx="80" cy="90" rx="6" ry="4.5" fill="#ff8fa3"/>

  <!-- mouth -->
  <path d="M80 94 Q80 100 70 102" stroke="#c0667a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M80 94 Q80 100 90 102" stroke="#c0667a" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- whiskers -->
  <line x1="6" y1="84" x2="50" y2="90" stroke="#e0a878" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="6" y1="96" x2="50" y2="96" stroke="#e0a878" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="154" y1="84" x2="110" y2="90" stroke="#e0a878" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="154" y1="96" x2="110" y2="96" stroke="#e0a878" stroke-width="1.5" stroke-linecap="round"/>

  <!-- paws -->
  <ellipse cx="58" cy="158" rx="18" ry="12" fill="#ffd9c2"/>
  <ellipse cx="102" cy="158" rx="18" ry="12" fill="#ffd9c2"/>

  <!-- belly highlight -->
  <ellipse cx="80" cy="134" rx="26" ry="20" fill="#fff" opacity="0.25"/>
</svg>