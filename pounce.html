<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0; padding: 0;
      background: rgba(14, 14, 14, 0.96);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Outfit', sans-serif;
      color: white;
      text-align: center;
    }
    #content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      animation: fadeUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .animal {
      width: 200px; height: 200px;
      object-fit: contain; display: block;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
      animation: petBounce 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes petBounce {
      from { transform: scale(0.6) translateY(30px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }
    .message {
      font-size: 30px;
      font-weight: 700;
      margin-top: 22px;
      max-width: 620px;
      line-height: 1.3;
      letter-spacing: -0.3px;
    }
    .sub-message {
      font-size: 14px;
      color: #888;
      margin-top: 6px;
    }
    .btn-row {
      margin-top: 28px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 14px 36px;
      font-size: 16px;
      font-family: 'Outfit', sans-serif;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
    }
    .btn:hover { transform: scale(1.06); }
    .btn:active { transform: scale(0.97); }
    .btn-yes { background: #ff9f2f; color: #141414; }
    .btn-yes:hover { background: #ffb84d; }
    .btn-no { background: #2a2a2a; color: #ccc; border: 1px solid #3a3a3a; }
    .btn-no:hover { background: #333; color: #fff; }
    .btn-snooze {
      background: transparent;
      color: #666;
      border: 1px solid #333;
      padding: 10px 22px;
      font-size: 13px;
      border-radius: 20px;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.15s;
    }
    .btn-snooze:hover { border-color: #555; color: #aaa; }

    .caught-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,95,95,0.12);
      border: 1px solid rgba(255,95,95,0.3);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #ff5f5f;
      margin-top: 18px;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .lockin-text {
      font-size: 72px;
      font-weight: 800;
      color: #ff5f5f;
      letter-spacing: -2px;
      animation: lockPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes bossShake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-8px); }
      40%     { transform: translateX(8px); }
      60%     { transform: translateX(-6px); }
      80%     { transform: translateX(6px); }
    }
    @keyframes angrySHAKE {
      0%,100% { transform: translateX(-5px) rotate(-3deg); }
      50%     { transform: translateX(5px) rotate(3deg); }
    }
    @keyframes lockPop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .progress-ring {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 56px; height: 56px;
    }
    .progress-ring circle {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
    }
    .ring-bg { stroke: #2a2a2a; }
    .ring-fill { stroke: #ff9f2f; transition: stroke-dashoffset 1s linear; transform: rotate(-90deg); transform-origin: 50% 50%; }

    .confetti-piece {
      position: fixed; top: -20px;
      width: 10px; height: 16px;
      opacity: 0.9;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>
  <div id="content" style="position:relative;z-index:1;"></div>
  <script>
    // animated background pulses
    (function() {
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const cx = canvas.width / 2, cy = canvas.height / 2;
      let t = 0;

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 3; i >= 0; i--) {
          const phase = (t * 0.4 + i * 0.7) % (Math.PI * 2);
          const r = 180 + i * 120 + Math.sin(phase) * 40;
          const alpha = 0.04 - i * 0.008;
          const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
          grad.addColorStop(0, `rgba(255,159,47,${alpha})`);
          grad.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fill();
        }
        t += 0.02;
        requestAnimationFrame(draw);
      }
      draw();
    })();

    const content = document.getElementById('content');
    let countdownInterval = null;

    function resetContent() {
        if (countdownInterval) { clearInterval(countdownInterval); clearTimeout(countdownInterval); countdownInterval = null; }
        const ring = document.getElementById('progressRing');
        if (ring) ring.remove();
        content.style.animation = 'none';
        content.offsetHeight;
        content.style.animation = '';
        document.body.style.animation = '';
    }

// ── pet mood on pounce screen ──
    let currentPet = 'penguin.png';
    window.pawback.getSettings && window.pawback.getSettings().then(s => {
      if (s?.pet) currentPet = s.pet;
    });

    window.pawback.onSetPet && window.pawback.onSetPet(p => { currentPet = p; });

    window.pawback.onSetScreen((type, pet, msg, extra) => {
      resetContent();
      const petSrc = pet || currentPet;
      const moodStyle = type === 'pounce'
        ? 'animation: petBounce 0.5s cubic-bezier(0.34,1.56,0.64,1), angrySHAKE 0.15s ease-in-out 0.5s 4;'
        : type === 'lockin'
        ? 'animation: petBounce 0.5s cubic-bezier(0.34,1.56,0.64,1); filter: drop-shadow(0 0 24px rgba(92,219,149,0.7));'
        : type === 'pomodoroSessionEnd'
        ? 'animation: petBounce 0.5s cubic-bezier(0.34,1.56,0.64,1); filter: drop-shadow(0 0 24px rgba(255,179,71,0.6));'
        : '';
      const img = `<img src="${petSrc}" class="animal" style="${moodStyle}" />`;
      
      if (type === 'pounce') {
        const appName = extra?.appName || '';
        const badge = appName ? `<div class="caught-badge">📍 ${appName}</div>` : '';
        content.innerHTML = `
          ${img}
          ${badge}
          <div class="message">${msg}</div>
        `;

        // Countdown ring
        const r = 24, circ = 2 * Math.PI * r;
        const ringEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        ringEl.setAttribute('id', 'progressRing');
        ringEl.setAttribute('class', 'progress-ring');
        ringEl.setAttribute('viewBox', '0 0 56 56');
        ringEl.innerHTML = `
          <circle class="ring-bg" cx="28" cy="28" r="${r}"/>
          <circle class="ring-fill" id="ringFill" cx="28" cy="28" r="${r}"
            stroke-dasharray="${circ}" stroke-dashoffset="0"/>`;
        document.body.appendChild(ringEl);

        let elapsed = 0;
        const duration = 2500;
        countdownInterval = setInterval(() => {
          elapsed += 50;
          const pct = elapsed / duration;
          document.getElementById('ringFill').style.strokeDashoffset = circ * pct;
          if (elapsed >= duration) {
            clearInterval(countdownInterval);
            countdownInterval = null;
            window.pawback.pounceDone();
          }
        }, 50);

      } else if (type === 'breakOffer') {
        const appName = extra?.appName || '';
        const appLabel = appName
          ? `<div class="sub-message">Caught on: <b style="color:#ddd">${appName}</b></div>`
          : '';
        const reasons = [
          { id: 'bathroom',   label: '🚻 Quick break' },
          { id: 'message',    label: '💬 Replying to msg' },
          { id: 'bored',      label: '😴 Got bored' },
          { id: 'distracted', label: '🧠 Just distracted' },
        ];
        const reasonBtns = reasons.map(r =>
          `<button class="btn-snooze reason-btn" data-reason="${r.id}">${r.label}</button>`
        ).join('');
        content.innerHTML = `
          ${img}
          <div class="message">You seem restless... need a break?</div>
          ${appLabel}
          <div class="sub-message" style="margin-top:14px;">What pulled you away?</div>
          <div class="btn-row" style="margin-top:8px;">${reasonBtns}</div>
          <div class="btn-row" style="margin-top:18px;">
            <button class="btn btn-yes" onclick="window.pawback.breakOfferYes()">Yes please 😴</button>
            <button class="btn btn-no" onclick="window.pawback.breakOfferNo()">No, I'm good</button>
          </div>
          <div class="btn-row" style="margin-top:12px;">
            <button class="btn-snooze" onclick="window.pawback.snoozeApp('${appName}', 5)">⏱ Snooze ${appName || 'app'} 5 min</button>
            <button class="btn-snooze" onclick="window.pawback.snoozeApp('${appName}', 15)">⏱ Snooze 15 min</button>
          </div>
        `;
        content.querySelectorAll('.reason-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            window.pawback.logStrayReason(btn.dataset.reason);
            content.querySelectorAll('.reason-btn').forEach(b => b.style.opacity = '0.3');
            btn.style.opacity = '1';
            btn.style.borderColor = 'var(--coral, #ff5f5f)';
          });
        });

      } else if (type === 'breakConfirm') {
        content.innerHTML = `
          ${img}
          <div class="message">You sure? Last chance to take a break.</div>
          <div class="btn-row">
            <button class="btn btn-yes" onclick="window.pawback.breakConfirmYes()">Fine, break 😮‍💨</button>
            <button class="btn btn-no" onclick="window.pawback.breakConfirmNo()">No — lock in 🔒</button>
          </div>
        `;

          } else if (type === 'bossPounce') {
        const allowed = extra?.allowedApps || [];
        const appBtns = allowed.length
          ? allowed.map(a => `<button class="btn-snooze" style="margin:4px;" onclick="window.pawback.switchToApp('${a}')">${a}</button>`).join('')
          : '';
        content.innerHTML = `
          ${img}
          <div class="message" style="color:#ff5f5f;">GET BACK TO WORK.</div>
          <div class="sub-message" style="margin-top:10px;color:#666;">Boss mode is on. No breaks. No mercy.</div>
          ${appBtns ? `<div style="margin-top:20px;"><div style="font-size:12px;color:#555;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">Switch back to</div><div style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px;">${appBtns}</div></div>` : ''}
        `;
        // shake the screen
        document.body.style.animation = 'none';
        document.body.offsetHeight;
        document.body.style.animation = 'bossShake 0.4s ease';

        } else if (type === 'generalSessionEnd') {
        const total   = extra?.totalMin    || 0;
        const focused = extra?.focusMin    || 0;
        const lost    = extra?.distractMin || 0;
        const caught  = extra?.pounceCount || 0;
        const pct     = total > 0 ? Math.round((focused / total) * 100) : 0;
        content.innerHTML = `
          ${img}
          <div style="font-size:13px;font-weight:700;color:var(--amber,#ffb347);text-transform:uppercase;letter-spacing:1px;margin-top:18px;">Session Complete</div>
          <div style="font-size:52px;font-weight:900;letter-spacing:-2px;margin:8px 0 4px;color:#fff;">${pct}%</div>
          <div style="font-size:15px;color:#888;margin-bottom:20px;">focus rate</div>
          <div style="display:flex;gap:24px;justify-content:center;margin-bottom:24px;">
            <div style="text-align:center;">
              <div style="font-size:28px;font-weight:800;color:#5cdb95;">${focused}m</div>
              <div style="font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.5px;">focused</div>
            </div>
            <div style="text-align:center;">
              <div style="font-size:28px;font-weight:800;color:#ff6b6b;">${lost}m</div>
              <div style="font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.5px;">lost</div>
            </div>
            <div style="text-align:center;">
              <div style="font-size:28px;font-weight:800;color:#ffb347;">${caught}x</div>
              <div style="font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.5px;">caught</div>
            </div>
          </div>
          <button class="btn btn-yes" onclick="window.pawback.generalAckEnd()">Done 🐾</button>
        `;

      } else if (type === 'pomodoroSessionEnd') {
        const round    = extra?.round    || 1;
        const breakMin = extra?.breakMin || 5;
        const caught   = extra?.pounceCount || 0;
        content.innerHTML = `
          ${img}
          <div style="font-size:20px;font-weight:800;color:#5cdb95;margin-top:18px;">🎉 Round ${round} done!</div>
          <div style="font-size:52px;font-weight:900;margin:8px 0 4px;letter-spacing:-2px;color:#fff;">GREAT WORK</div>
          <div style="display:flex;gap:24px;justify-content:center;margin:16px 0;">
            <div style="text-align:center;">
              <div style="font-size:28px;font-weight:800;color:#ffb347;">${extra?.workMin || 25}m</div>
              <div style="font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.5px;">focused</div>
            </div>
            <div style="text-align:center;">
              <div style="font-size:28px;font-weight:800;color:#ff6b6b;">${caught}x</div>
              <div style="font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.5px;">caught</div>
            </div>
          </div>
          <div style="font-size:15px;color:#888;margin-bottom:20px;">Break starting — ${breakMin} min. Go move around. 🍵</div>
          <button class="btn btn-yes" onclick="window.pawback.pomodoroAckSessionEnd()">Start break ☕</button>
        `;

        } else if (type === 'pomodoroFinalSummary') {
        const rounds  = extra?.rounds       || 1;
        const focused = extra?.totalFocusMin || 0;
        const caught  = extra?.pounceCount  || 0;
        const hrs     = Math.floor(focused / 60);
        const mins    = focused % 60;
        const timeStr = hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`;
        content.innerHTML = `
          ${img}
          <div style="font-size:13px;font-weight:700;color:#ffb347;text-transform:uppercase;letter-spacing:1px;margin-top:18px;">Pomodoro Complete 🍅</div>
          <div style="font-size:52px;font-weight:900;letter-spacing:-2px;margin:8px 0 4px;color:#fff;">${timeStr}</div>
          <div style="font-size:15px;color:#888;margin-bottom:20px;">total focus time</div>
          <div style="display:flex;gap:32px;justify-content:center;margin-bottom:24px;">
            <div style="text-align:center;">
              <div style="font-size:36px;font-weight:900;color:#5cdb95;">${rounds}</div>
              <div style="font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.5px;">rounds</div>
            </div>
            <div style="text-align:center;">
              <div style="font-size:36px;font-weight:900;color:#ff6b6b;">${caught}</div>
              <div style="font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.5px;">caught</div>
            </div>
          </div>
          <button class="btn btn-yes" onclick="window.pawback.pomodoroAckFinal()">Done 🐾</button>
        `;

      } else if (type === 'pomodoroBreakEnd') {
        const round = extra?.round || 2;
        content.innerHTML = `
          ${img}
          <div style="font-size:48px;font-weight:900;margin-top:18px;letter-spacing:-2px;color:#ff9f2f;">LOCK IN 🔒</div>
          <div style="font-size:18px;color:#aaa;margin-top:8px;">Round ${round} — let's go.</div>
        `;

      
        } else if (type === 'pomodoroCountdown') {
        content.innerHTML = `
          <div class="lockin-text" id="countNum" style="font-size:120px;font-weight:900;letter-spacing:-4px;color:#ff9f2f;animation:lockPop 0.3s cubic-bezier(0.34,1.56,0.64,1);">3</div>
          <div class="sub-message" style="margin-top:16px;font-size:16px;">Get ready…</div>
        `;
        let n = 3;
        countdownInterval = setTimeout(function tick() {
          n--;
          const el = document.getElementById('countNum');
          if (!el) return;
          if (n <= 0) {
            el.style.animation = 'none';
            el.offsetHeight;
            el.style.animation = 'lockPop 0.3s cubic-bezier(0.34,1.56,0.64,1)';
            el.style.color = '#5cdb95';
            el.textContent = 'GO! 🔒';
          } else {
            el.style.animation = 'none';
            el.offsetHeight;
            el.style.animation = 'lockPop 0.3s cubic-bezier(0.34,1.56,0.64,1)';
            el.textContent = n;
            countdownInterval = setTimeout(tick, 1000);
          }
        }, 1000);
      } else if (type === 'intervention') {
        content.innerHTML = `
          ${img}
          <div class="message" style="font-size:24px;font-weight:700;margin-top:16px;">hey. something's off.</div>
          <div class="sub-message" style="margin-top:8px;max-width:400px;line-height:1.6;color:#aaa;">you don't have to work right now.<br>what's actually going on?</div>
          <div class="btn-row" style="margin-top:28px;flex-direction:column;gap:10px;align-items:center;">
            <button class="btn btn-no" style="width:260px;" onclick="window.pawback.interventionResponse('overwhelmed')">😵 I'm overwhelmed</button>
            <button class="btn btn-no" style="width:260px;" onclick="window.pawback.interventionResponse('tired')">😴 I'm just tired</button>
            <button class="btn btn-yes" style="width:260px;" onclick="window.pawback.interventionResponse('lockin')">🔒 I'm good — lock me in</button>
          </div>
        `;

      } else if (type === 'lockin') {
        content.innerHTML = `
          <img src="${pet}" class="animal" style="filter:drop-shadow(0 0 30px rgba(255,159,47,0.6))"/>
          <div class="lockin-text">LOCK IN 🔒</div>
          <div class="sub-message" style="margin-top:12px;">Break's over. Get back to it.</div>
        `;
        spawnConfetti();
      }
    });

    function spawnConfetti() {
      const colors = ['#ff9f2f', '#ff5f5f', '#5cdb95', '#4fc3f7', '#fff', '#ffee55'];
      for (let i = 0; i < 30; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.cssText = `
          left: ${Math.random() * 100}vw;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          animation-duration: ${1.5 + Math.random() * 2}s;
          animation-delay: ${Math.random() * 0.4}s;
          width: ${6 + Math.random() * 8}px;
          height: ${10 + Math.random() * 10}px;
          border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        `;
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 4500);
      }
    }
  </script>
</body>
</html>
