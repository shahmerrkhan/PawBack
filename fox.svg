<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 175" width="160" height="175">
  <defs>
    <radialGradient id="foxBody" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ffb27a"/>
      <stop offset="100%" stop-color="#ff9248"/>
    </radialGradient>
    <radialGradient id="foxFace" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#fffaf2"/>
      <stop offset="100%" stop-color="#fff3e6"/>
    </radialGradient>
  </defs>

  <!-- shadow -->
  <ellipse cx="84" cy="160" rx="48" ry="8" fill="#000" opacity="0.15"/>

  <!-- tail -->
  <path d="M120 138 Q158 134 156 100 Q154 78 134 82 Q146 104 122 122 Z" fill="url(#foxBody)"/>
  <ellipse cx="142" cy="106" rx="14" ry="10" fill="#fff" transform="rotate(-25,142,106)"/>

  <!-- ears -->
  <polygon points="36,58 14,8 64,38" fill="url(#foxBody)"/>
  <polygon points="124,58 146,8 96,38" fill="url(#foxBody)"/>
  <polygon points="39,54 26,22 56,38" fill="#ffd9bf"/>
  <polygon points="121,54 134,22 104,38" fill="#ffd9bf"/>

  <!-- body -->
  <ellipse cx="80" cy="130" rx="50" ry="36" fill="url(#foxBody)"/>

  <!-- head -->
  <circle cx="80" cy="76" r="48" fill="url(#foxBody)"/>

  <!-- face mask -->
  <ellipse cx="80" cy="92" rx="30" ry="24" fill="url(#foxFace)"/>

  <!-- eyes -->
  <ellipse cx="58" cy="72" rx="14" ry="16" fill="#fff"/>
  <ellipse cx="102" cy="72" rx="14" ry="16" fill="#fff"/>
  <ellipse cx="61" cy="77" rx="8.5" ry="10" fill="#3a2418"/>
  <ellipse cx="105" cy="77" rx="8.5" ry="10" fill="#3a2418"/>
  <circle cx="64" cy="70" r="3" fill="#fff"/>
  <circle cx="108" cy="70" r="3" fill="#fff"/>

  <!-- cheeks -->
  <ellipse cx="44" cy="90" rx="13" ry="9" fill="#ffc9a3" opacity="0.7"/>
  <ellipse cx="116" cy="90" rx="13" ry="9" fill="#ffc9a3" opacity="0.7"/>

  <!-- nose -->
  <ellipse cx="80" cy="96" rx="6.5" ry="5" fill="#3a2418"/>
  <ellipse cx="78" cy="94" rx="2" ry="1.5" fill="#fff" opacity="0.6"/>

  <!-- mouth -->
  <path d="M80 101 Q80 108 68 110" stroke="#3a2418" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M80 101 Q80 108 92 110" stroke="#3a2418" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- whiskers -->
  <line x1="6" y1="92" x2="48" y2="98" stroke="#ffcfae" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="6" y1="104" x2="48" y2="104" stroke="#ffcfae" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="154" y1="92" x2="112" y2="98" stroke="#ffcfae" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="154" y1="104" x2="112" y2="104" stroke="#ffcfae" stroke-width="1.5" stroke-linecap="round"/>

  <!-- paws -->
  <ellipse cx="58" cy="160" rx="18" ry="12" fill="#ffd9bf"/>
  <ellipse cx="102" cy="160" rx="18" ry="12" fill="#ffd9bf"/>

  <!-- belly highlight -->
  <ellipse cx="80" cy="136" rx="26" ry="20" fill="#fff" opacity="0.22"/>
</svg>