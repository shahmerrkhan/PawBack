<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 170" width="160" height="170">
  <defs>
    <radialGradient id="bearBody" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#e8c39f"/>
      <stop offset="100%" stop-color="#c9a07a"/>
    </radialGradient>
    <radialGradient id="bearMuzzle" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#fdf0e0"/>
      <stop offset="100%" stop-color="#f5e3cf"/>
    </radialGradient>
  </defs>

  <!-- shadow -->
  <ellipse cx="80" cy="158" rx="48" ry="8" fill="#000" opacity="0.15"/>

  <!-- ears -->
  <circle cx="36" cy="38" r="22" fill="url(#bearBody)"/>
  <circle cx="124" cy="38" r="22" fill="url(#bearBody)"/>
  <circle cx="36" cy="38" r="11" fill="#f0d3b8"/>
  <circle cx="124" cy="38" r="11" fill="#f0d3b8"/>

  <!-- body -->
  <ellipse cx="80" cy="128" rx="50" ry="36" fill="url(#bearBody)"/>

  <!-- head -->
  <circle cx="80" cy="74" r="48" fill="url(#bearBody)"/>

  <!-- muzzle -->
  <ellipse cx="80" cy="88" rx="26" ry="20" fill="url(#bearMuzzle)"/>

  <!-- eyes -->
  <ellipse cx="58" cy="68" rx="13" ry="15" fill="#fff"/>
  <ellipse cx="102" cy="68" rx="13" ry="15" fill="#fff"/>
  <ellipse cx="61" cy="73" rx="8" ry="9.5" fill="#4a3220"/>
  <ellipse cx="105" cy="73" rx="8" ry="9.5" fill="#4a3220"/>
  <circle cx="64" cy="66" r="3" fill="#fff"/>
  <circle cx="108" cy="66" r="3" fill="#fff"/>

  <!-- cheeks -->
  <ellipse cx="44" cy="86" rx="13" ry="9" fill="#ffc9a8" opacity="0.7"/>
  <ellipse cx="116" cy="86" rx="13" ry="9" fill="#ffc9a8" opacity="0.7"/>

  <!-- nose -->
  <ellipse cx="80" cy="90" rx="9" ry="6.5" fill="#8a5c3c"/>
  <ellipse cx="77" cy="88" rx="3" ry="2" fill="#fff" opacity="0.5"/>

  <!-- mouth -->
  <path d="M80 96 Q80 104 68 106" stroke="#8a5c3c" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M80 96 Q80 104 92 106" stroke="#8a5c3c" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- paws -->
  <ellipse cx="58" cy="158" rx="19" ry="13" fill="#e8c39f"/>
  <ellipse cx="102" cy="158" rx="19" ry="13" fill="#e8c39f"/>
  <ellipse cx="58" cy="158" rx="10" ry="6" fill="#f0d3b8"/>
  <ellipse cx="102" cy="158" rx="10" ry="6" fill="#f0d3b8"/>

  <!-- belly highlight -->
  <ellipse cx="80" cy="134" rx="28" ry="20" fill="#fff" opacity="0.18"/>
</svg>